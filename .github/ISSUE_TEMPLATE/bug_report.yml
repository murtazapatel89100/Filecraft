name: Bug report
description: Report a reproducible problem in organizer-cli
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.

  - type: dropdown
    id: implementation
    attributes:
      label: Affected implementation
      options:
        - file-organiser-python
        - file-organiser-go
        - both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Tag/version (example: v1.2.3)"
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Exact CLI command and flags
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell

  - type: textarea
    id: notes
    attributes:
      label: Additional context
