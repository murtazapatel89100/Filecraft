name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 1.2.3 or v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            input_version="${{ github.event.inputs.version }}"
            if [[ "$input_version" =~ ^v ]]; then
              version="$input_version"
            else
              version="v$input_version"
            fi
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version/tag: $version"
            echo "Expected semver format like v1.2.3"
            exit 1
          fi

          tag_version="${version#v}"
          root_version="$(tr -d '[:space:]' < VERSION)"
          pyproject_version="$(grep -E '^version = ' file-organiser-python/pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')"

          if [ -z "$root_version" ] || [ -z "$pyproject_version" ]; then
            echo "Unable to read VERSION or file-organiser-python/pyproject.toml version"
            exit 1
          fi

          if [ "$tag_version" != "$root_version" ]; then
            echo "Tag version ($tag_version) does not match VERSION ($root_version)"
            exit 1
          fi

          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "Tag version ($tag_version) does not match file-organiser-python version ($pyproject_version)"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  python-release:
    name: Python release (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            label: linux-amd64
          - runs_on: macos-latest
            label: macos-amd64
          - runs_on: windows-latest
            label: windows-amd64
    defaults:
      run:
        working-directory: file-organiser-python
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev --sync

      - name: Build PyInstaller binary
        run: |
          poetry run pyinstaller \
            --onefile \
            --name organizer-python-${{ needs.prepare.outputs.version }}-${{ matrix.label }} \
            --paths src \
            src/file_organiser_python/main.py

      - name: Upload Python release artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-release-${{ matrix.label }}
          path: file-organiser-python/dist/*

  go-release:
    name: Go release (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            label: linux-amd64
            ext: ""
          - runs_on: macos-latest
            label: macos-amd64
            ext: ""
          - runs_on: windows-latest
            label: windows-amd64
            ext: ".exe"
    defaults:
      run:
        working-directory: file-organiser-go
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: file-organiser-go/go.mod

      - name: Build Go binary
        run: |
          mkdir -p dist
          output="dist/organizer-go-${{ needs.prepare.outputs.version }}-${{ matrix.label }}${{ matrix.ext }}"
          go build -o "$output" .

      - name: Upload Go release artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-release-${{ matrix.label }}
          path: file-organiser-go/dist/*

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - python-release
      - go-release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*
