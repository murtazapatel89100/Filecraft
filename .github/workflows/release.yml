name: Filecraft Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 1.2.3 or v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            input_version="${{ github.event.inputs.version }}"
            if [[ "$input_version" =~ ^v ]]; then
              version="$input_version"
            else
              version="v$input_version"
            fi
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version/tag: $version"
            echo "Expected semver format like v1.2.3"
            exit 1
          fi

          tag_version="${version#v}"
          root_version="$(tr -d '[:space:]' < VERSION)"
          pyproject_version="$(grep -E '^version = ' filecraft-python/pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')"

          if [ -z "$root_version" ] || [ -z "$pyproject_version" ]; then
            echo "Unable to read VERSION or filecraft-python/pyproject.toml version"
            exit 1
          fi

          if [ "$tag_version" != "$root_version" ]; then
            echo "Tag version ($tag_version) does not match VERSION ($root_version)"
            exit 1
          fi

          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "Tag version ($tag_version) does not match filecraft-python version ($pyproject_version)"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  python-release:
    name: Filecraft Python implementation release (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            label: linux-amd64
          - runs_on: macos-latest
            label: macos-amd64
          - runs_on: windows-latest
            label: windows-amd64
    defaults:
      run:
        working-directory: filecraft-python
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev --sync

      - name: Build PyInstaller binary
        run: |
          poetry run pyinstaller \
            --onefile \
            --name Filecraft-${{ needs.prepare.outputs.version }}-${{ matrix.label }}-python \
            --paths src \
            src/file_organiser_python/main.py

      - name: Upload Filecraft Python release artifact
        uses: actions/upload-artifact@v7
        with:
          name: filecraft-python-impl-release-${{ matrix.label }}
          path: filecraft-python/dist/Filecraft-${{ needs.prepare.outputs.version }}-${{ matrix.label }}-python*

  python-package-release:
    name: Filecraft Python package release artifacts
    runs-on: ubuntu-latest
    needs: prepare
    defaults:
      run:
        working-directory: filecraft-python
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Build Python package artifacts
        run: poetry build

      - name: Upload Python package release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: filecraft-python-package-release
          path: filecraft-python/dist/*

  go-release:
    name: Filecraft Go implementation release (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            label: linux-amd64
            ext: ""
          - runs_on: macos-latest
            label: macos-amd64
            ext: ""
          - runs_on: windows-latest
            label: windows-amd64
            ext: ".exe"
    defaults:
      run:
        working-directory: filecraft-go
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: filecraft-go/go.mod

      - name: Build Go binary
        run: |
          mkdir -p dist
          output="dist/Filecraft-${{ needs.prepare.outputs.version }}-${{ matrix.label }}${{ matrix.ext }}"
          go build -o "$output" .

      - name: Upload Filecraft Go release artifact
        uses: actions/upload-artifact@v7
        with:
          name: filecraft-go-impl-release-${{ matrix.label }}
          path: filecraft-go/dist/*

  publish-pypi:
    name: Publish filecraft to PyPI
    runs-on: ubuntu-latest
    needs:
      - prepare
      - python-package-release

    steps:
      - name: Download Python package artifacts
        uses: actions/download-artifact@v8
        with:
          name: filecraft-python-package-release
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-release:
    name: Publish Filecraft GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - python-release
      - python-package-release
      - go-release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Filecraft ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*

  publish-aur-python:
    name: Publish filecraft-cli to AUR (Python)
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-pypi
      - publish-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up SSH for AUR
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Add AUR host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/filecraft-cli.git aur-python

      - name: Fetch PyPI source tarball checksum
        id: pypi_sha
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          tag_version="${version#v}"
          sdist_url="https://files.pythonhosted.org/packages/source/f/filecraft-cli/filecraft_cli-${tag_version}.tar.gz"
          for i in 1 2 3 4 5; do
            sha256=$(curl -fsSL "$sdist_url" 2>/dev/null | sha256sum | awk '{print $1}')
            if [ -n "$sha256" ] && [ "$sha256" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
              break
            fi
            echo "Waiting for PyPI propagation (attempt $i)..."
            sleep 15
          done
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Generate PKGBUILD and .SRCINFO
        shell: bash
        run: |
          tag_version="${{ steps.pypi_sha.outputs.tag_version }}"
          sha256="${{ steps.pypi_sha.outputs.sha256 }}"

          cat > aur-python/PKGBUILD <<PKGBUILD_EOF
          # Maintainer: Filecraft <murtazapatel89100@gmail.com>
          pkgname=filecraft-cli
          pkgver=${tag_version}
          pkgrel=1
          pkgdesc="A CLI organizer you didn't know you needed — yet. (Python)"
          arch=('any')
          url="https://github.com/murtazapatel89100/Filecraft"
          license=('MIT')
          depends=('python' 'python-typer')
          makedepends=('python-build' 'python-installer' 'python-wheel' 'python-poetry-core')
          source=("https://files.pythonhosted.org/packages/source/f/filecraft-cli/filecraft_cli-\${pkgver}.tar.gz")
          sha256sums=('${sha256}')

          build() {
            cd "filecraft_cli-\${pkgver}"
            python -m build --wheel --no-isolation
          }

          package() {
            cd "filecraft_cli-\${pkgver}"
            python -m installer --destdir="\$pkgdir" dist/*.whl
            install -Dm644 LICENSE "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"
          }
          PKGBUILD_EOF

          cat > aur-python/.SRCINFO <<SRCINFO_EOF
          pkgbase = filecraft-cli
          	pkgdesc = A CLI organizer you didn't know you needed — yet. (Python)
          	pkgver = ${tag_version}
          	pkgrel = 1
          	url = https://github.com/murtazapatel89100/Filecraft
          	arch = any
          	license = MIT
          	makedepends = python-build
          	makedepends = python-installer
          	makedepends = python-wheel
          	makedepends = python-poetry-core
          	depends = python
          	depends = python-typer
          	source = https://files.pythonhosted.org/packages/source/f/filecraft-cli/filecraft_cli-${tag_version}.tar.gz
          	sha256sums = ${sha256}

          pkgname = filecraft-cli
          SRCINFO_EOF

      - name: Push to AUR
        working-directory: aur-python
        run: |
          git config user.name "${{ secrets.AUR_USERNAME }}"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update to ${{ needs.prepare.outputs.version }}"
          git push

  publish-aur-go:
    name: Publish filecraft-cli-bin to AUR (Go binary)
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up SSH for AUR
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Add AUR host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/filecraft-cli-bin.git aur-go

      - name: Compute checksums and generate PKGBUILD
        id: go_sha
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          tag_version="${version#v}"
          binary_url="https://github.com/murtazapatel89100/Filecraft/releases/download/${version}/Filecraft-${version}-linux-amd64"
          license_url="https://raw.githubusercontent.com/murtazapatel89100/Filecraft/${version}/LICENSE"

          for i in 1 2 3 4 5; do
            sha256=$(curl -fsSL "$binary_url" 2>/dev/null | sha256sum | awk '{print $1}')
            if [ -n "$sha256" ] && [ "$sha256" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
              break
            fi
            echo "Waiting for release asset propagation (attempt $i)..."
            sleep 15
          done

          license_sha=$(curl -fsSL "$license_url" | sha256sum | awk '{print $1}')

          cat > aur-go/PKGBUILD <<PKGBUILD_EOF
          # Maintainer: Filecraft <murtazapatel89100@gmail.com>
          pkgname=filecraft-cli-bin
          pkgver=${tag_version}
          pkgrel=1
          pkgdesc="A CLI organizer you didn't know you needed — yet. (Go binary)"
          arch=('x86_64')
          url="https://github.com/murtazapatel89100/Filecraft"
          license=('MIT')
          provides=('filecraft')
          conflicts=('filecraft-cli')
          source=("Filecraft-v${tag_version}-linux-amd64::${binary_url}"
                  "LICENSE::${license_url}")
          sha256sums=('${sha256}'
                      '${license_sha}')

          package() {
            install -Dm755 "Filecraft-v${tag_version}-linux-amd64" "\$pkgdir/usr/bin/filecraft"
            install -Dm644 LICENSE "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"
          }
          PKGBUILD_EOF

          cat > aur-go/.SRCINFO <<SRCINFO_EOF
          pkgbase = filecraft-cli-bin
          	pkgdesc = A CLI organizer you didn't know you needed — yet. (Go binary)
          	pkgver = ${tag_version}
          	pkgrel = 1
          	url = https://github.com/murtazapatel89100/Filecraft
          	arch = x86_64
          	license = MIT
          	provides = filecraft
          	conflicts = filecraft-cli
          	source = Filecraft-v${tag_version}-linux-amd64::${binary_url}
          	source = LICENSE::${license_url}
          	sha256sums = ${sha256}
          	sha256sums = ${license_sha}

          pkgname = filecraft-cli-bin
          SRCINFO_EOF

          echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Push to AUR
        working-directory: aur-go
        run: |
          git config user.name "${{ secrets.AUR_USERNAME }}"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update to ${{ needs.prepare.outputs.version }}"
          git push
