version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/filecraft-python"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/filecraft-go"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
